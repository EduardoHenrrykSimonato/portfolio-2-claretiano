<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Acesso ao Sistema</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <div class="logo-container ion-text-center">
      <ion-icon name="headset-outline" color="primary" class="logo-icon"></ion-icon>
      <h2>Controle de Chamados Técnicos</h2>
      <p>Informe suas credenciais</p>
    </div>

    <ion-card>
      <ion-card-content>
        <form (ngSubmit)="entrar()">
          <ion-list lines="none">
            <ion-item class="input-item">
              <ion-label position="stacked">Usuário</ion-label>
              <ion-input type="text" name="usuario" [(ngModel)]="usuario" placeholder="Ex: administrador, tecnico" required></ion-input>
            </ion-item>

            <ion-item class="input-item">
              <ion-label position="stacked">Senha</ion-label>
              <ion-input type="password" name="senha" [(ngModel)]="senha" placeholder="Sua senha" required></ion-input>
            </ion-item>
          </ion-list>

          <ion-button type="submit" expand="block" size="large" color="primary" class="ion-margin-top">
            <span style="color: #ffffff; font-weight: 600;">Entrar</span>
          </ion-button>
        </form>
      </ion-card-content>
    </ion-card>

    <!-- Dica de acesso para testes -->
    <div class="hint-card ion-text-center ion-margin-top">
      <ion-note color="medium">
        <strong>Acesso para teste:</strong><br>
        Usuário: <code>admin</code> &nbsp;|&nbsp; Senha: <code>admin</code>
      </ion-note>
    </div>

  </div>
</ion-content>
